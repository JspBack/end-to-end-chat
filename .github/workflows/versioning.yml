name: versioning

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new-tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - id: bump
        name: bump and tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1)
          NEW=v$(echo "$LATEST" | cut -d. -f1 | tr -d v).$(echo "$LATEST" | cut -d. -f2).$(($(echo "$LATEST" | cut -d. -f3)+1))
          git tag "$NEW" && git push --tags
          echo "tag=$NEW" >> "$GITHUB_OUTPUT"

  release-linux:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: set platform
        run: sed -i '/- darwin/d; /- windows/d' .goreleaser.yaml

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    needs: [tag, release-linux]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: set platform
        shell: pwsh
        run: |
          (Get-Content .goreleaser.yaml).replace('- linux','# - linux').replace('- darwin','# - darwin') | Set-Content .goreleaser.yaml

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
