name: versioning

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: bump and tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1)
          NEW=v$(echo "$LATEST" | cut -d. -f1 | tr -d v).$(echo "$LATEST" | cut -d. -f2).$(($(echo "$LATEST" | cut -d. -f3)+1))
          git tag "$NEW" && git push --tags
